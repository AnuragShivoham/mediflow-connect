<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MedFlow — Orders & Inventory for Doctors and M.R.s</title>
    <meta
      name="description"
      content="Secure healthcare workflow platform to manage inventory, orders, deliveries and communication between Doctors and Medical Representatives."
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("medflow-theme");
          var resolved =
            stored === "dark" || stored === "light"
              ? stored
              : window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.classList.add(resolved);
        } catch (e) {
          document.documentElement.classList.add("light");
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
